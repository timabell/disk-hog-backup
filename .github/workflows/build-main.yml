name: build-main

on:
  push:
    branches: [ "main" ]

# Prevent concurrent releases racing to create the same version tag
concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  ci:
    uses: ./.github/workflows/_ci.yml

  check-release:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check_changes.outputs.should_release }}
      tag: ${{ steps.version_outputs.outputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Generate changelog
        id: changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: .github/cliff.toml
          args: --unreleased --strip header

      - name: Check for release-worthy changes
        id: check_changes
        # git-cliff outputs ### section headers only when there are matching
        # commits (## headers are always output, so we check for ### specifically)
        run: |
          if echo "${{ steps.changelog.outputs.content }}" | grep -q '###'; then
            echo "Release-worthy changes found"
            echo "should_release=true" >> $GITHUB_OUTPUT
          else
            echo "No release-worthy changes found"
            echo "should_release=false" >> $GITHUB_OUTPUT
          fi

      - name: Detect bump type
        if: steps.check_changes.outputs.should_release == 'true'
        id: bump
        run: |
          BUMP_TYPE=$(.github/workflows/detect-bump.sh)
          echo "type=$BUMP_TYPE" >> $GITHUB_OUTPUT
          echo "Bump type: ${BUMP_TYPE:-patch}"

      - name: Calculate next version
        if: steps.check_changes.outputs.should_release == 'true'
        id: version
        uses: orhun/git-cliff-action@v4
        with:
          config: .github/cliff.toml
          args: >-
            ${{ steps.bump.outputs.type &&
            format('--bump {0} --bumped-version', steps.bump.outputs.type) ||
            '--bumped-version' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Set version outputs
        if: steps.check_changes.outputs.should_release == 'true'
        id: version_outputs
        run: |
          VERSION="${{ steps.version.outputs.content }}"
          VERSION="${VERSION#v}"  # Remove v prefix if present
          VERSION="${VERSION%%$'\n'*}"  # Remove any trailing newlines
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=v$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

  ci-release:
    needs: [ci, check-release]
    if: needs.check-release.outputs.should_release == 'true'
    uses: ./.github/workflows/_ci.yml
    with:
      release_tag: ${{ needs.check-release.outputs.tag }}

  create-tag:
    needs: [check-release, ci-release]
    if: needs.check-release.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag ${{ needs.check-release.outputs.tag }}
          git push origin ${{ needs.check-release.outputs.tag }}

  release:
    needs: [check-release, ci-release, create-tag]
    if: needs.check-release.outputs.should_release == 'true'
    uses: ./.github/workflows/_release.yml
    with:
      release_tag: ${{ needs.check-release.outputs.tag }}
